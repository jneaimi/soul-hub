name: human-smoke-naseej
version: 1.0.0
project: naseej
description: |
  ADR-011 v1 smoke — single human step. Pauses on POST /run, expects a
  POST /respond with the field payload, returns the response in
  steps.ask-name.outputs.response.

steps:
  - id: ask-name
    human:
      prompt: "What is your name?"
      fields:
        - name: name
          type: text
          required: true
      timeout_sec: 60
