name: peer-brief
version: 1.0.0
project: naseej
description: |
  Daily peer-brief PDF render. Naseej port of scripts/peer-brief-render.py
  (ADR-007). Five steps compose: signal-trend extraction (shell-exec), recipe
  synthesis (peer-brief-synth agent), stop-slop gate (peer-brief-aware scanner
  via shell-exec), katib PDF render, Telegram alert.

  Faithful to the legacy script for the 5-day shadow window. The stop-slop
  scan deliberately invokes the existing peer-brief-aware scanner script
  (scripts/peer-brief/stop-slop-scan.py) rather than the generic stop-slop
  component, because the scanner extracts prose fields from the katib recipe
  YAML and the generic component scans raw text. Swap to the generic component
  once peer-brief parity is no longer the bar.

inputs:
  - name: date
    type: date
    default: "{{date}}"
    description: Render date in YYYY-MM-DD. Defaults to today via the engine global.
  - name: miner_daily
    type: file
    must_exist: true
    path: "{{HOME}}/vault/content/signal-forge/reports/{{inputs.date}}-miner-daily.md"
    description: Today's Signal Forge miner-daily report. Fail-fast if missing.
  - name: trend_helper
    type: string
    default: "{{HOME}}/.claude/skills/katib/scripts/extract-signal-trend.py"
    description: Path to the signal-trend extractor script. Defaults to the katib skill location.
  - name: canonical_recipe
    type: string
    default: "{{HOME}}/.katib/recipes/peer-brief-2026-05-14-miner-daily-en.yaml"
    description: Canonical recipe template the synth agent reads for section structure + voice.
  - name: scanner_script
    type: string
    default: "{{HOME}}/dev/soul-hub/scripts/peer-brief/stop-slop-scan.py"
    description: Peer-brief-aware stop-slop scanner. Extracts prose fields from the synthesised recipe and scores them.
  - name: min_score
    type: integer
    default: 30
    description: Minimum stop-slop score (0-50). Below this the recipe fails the gate.
  - name: out_pdf
    type: string
    default: "{{HOME}}/Downloads/peer-brief-{{inputs.date}}.en.pdf"
    description: Absolute output path for the rendered PDF.

steps:
  - id: extract-trend
    component: shell-exec@1.0.0
    inputs:
      cmd: uv
      args:
        - run
        - "{{inputs.trend_helper}}"
        - --as-of
        - "{{inputs.date}}"
      stdout_to_file: "{{work_dir}}/trend.yaml"
      timeout_sec: 120

  - id: synth
    agent: peer-brief-synth
    task: |
      Synthesise today's peer-brief recipe.

      DATE: {{inputs.date}}
      MINER-DAILY REPORT: {{inputs.miner_daily}}
      CANONICAL RECIPE TEMPLATE: {{inputs.canonical_recipe}}
      SIGNAL-TREND YAML (Figure 0 input, paste verbatim): {{steps.extract-trend.outputs.stdout_path}}
      OUTPUT RECIPE PATH: {{work_dir}}/peer-brief-{{inputs.date}}-synthesised.yaml

      Read the canonical recipe to absorb section structure and prose voice.
      Read today's miner-daily for findings, signal counts, and source material.
      Read the trend YAML; embed verbatim under the signal-trend-area section.

      Write the synthesised recipe to the output path. Apply stop-slop discipline.
      Apply the six lessons (em-dash ban, text: not quote: for pull-quote, etc.).

      When the recipe file is written and the em-dash self-check is clean,
      output EXACTLY these three lines as your final response, on their own,
      with nothing after them:

      ===ARTIFACT===
      {{work_dir}}/peer-brief-{{inputs.date}}-synthesised.yaml
      ===END===

      Then (separately, via a Bash tool call) echo the [SYNTH-DONE] line
      to stderr for the legacy `peer-brief-render.sh` wrapper compatibility:
      `echo "[SYNTH-DONE] sections=14 findings=<N> output={{work_dir}}/peer-brief-{{inputs.date}}-synthesised.yaml" >&2`
    budget:
      # 30-min ceiling. Empirical from 2026-05-17 ADR-007 S3 testing (4
      # PTY+/goal attempts on the same 2026-05-15 miner-daily):
      #   run 1: goal_achieved at 11:24 / 1 turn
      #   run 2: timeout at 15:00 / 0 turns (sonnet variance)
      #   run 3: goal_achieved at 20:11 / 1 turn (file written, marker miss)
      #   run 4: operator-cancelled at 4:23 mid-flight
      # 1800s = ~2.5x the run-1 baseline. If we observe a clean run hit
      # this ceiling, the slowness is upstream (sonnet API), not Naseej —
      # bump model or fall back to opus.
      timeout_sec: 1800
      max_turns: 50
      max_usd: 2.00
    # Goal condition references the literal marker text so Claude Code's `/goal`
    # evaluator can verify the ARTIFACT block has actually been printed (run 3
    # showed the evaluator firing on fuzzy "intent" rather than the literal block).
    goal_condition: the literal string "===ARTIFACT===" was printed as part of the agent's final response

  - id: scan
    component: shell-exec@1.0.0
    depends_on: [synth]
    inputs:
      cmd: uv
      args:
        - run
        - "{{inputs.scanner_script}}"
        - "{{steps.synth.outputs.artifact_path}}"
        # NOTE: collapsed to --flag=value because the templating engine
        # preserves the native int type when the whole string is one
        # placeholder; shell-exec rejects non-string args. The mixed-string
        # form forces String() coercion at interpolate time.
        - "--min-score={{inputs.min_score}}"
      stdout_to_file: "{{work_dir}}/stop-slop.json"
      timeout_sec: 60

  - id: render
    component: katib-build@1.0.0
    depends_on: [scan]
    inputs:
      recipe_path: "{{steps.synth.outputs.artifact_path}}"
      out_pdf: "{{inputs.out_pdf}}"
      lang: en
      brand: jasem
      skip_audit_check: true

  - id: notify
    component: channel-send-text@1.0.0
    depends_on: [render]
    inputs:
      channel: telegram
      text: |
        📊 Peer brief ready ({{inputs.date}})
        File: {{steps.render.outputs.pdf_path | basename}}
        Size: {{steps.render.outputs.pdf_size_bytes | human_bytes}}
        Build: {{steps.render.outputs.build_duration_ms}}ms
