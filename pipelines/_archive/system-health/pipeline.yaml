name: system-health
description: Check disk space, memory, and uptime then send results via Telegram
version: 1.0.0

env:
  - name: TELEGRAM_BOT_TOKEN
    description: Telegram Bot API token
    required: true
  - name: TELEGRAM_CHAT_ID
    description: Telegram chat ID for notifications
    required: true

steps:
  - id: check
    type: script
    run: bash scripts/check.sh
    output: /tmp/pipeline-runs/$RUN_ID/health.txt

  - id: notify
    type: channel
    channel: telegram
    action: send
    message: "$steps.check.output"
    depends_on: [check]
