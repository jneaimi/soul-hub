name: gate-test
description: "Test pipeline for approval gates and prompt steps"
version: "1.0.0"
author: jasem

inputs:
  - name: output_dir
    type: path
    description: "Directory to save output"
    default: ~/SecondBrain/02-areas/pipelines/gate-test

steps:
  - id: generate
    type: script
    run: "python3 scripts/generate.py"
    output: /tmp/pipeline-runs/$RUN_ID/draft.md
    timeout: 30

  - id: review
    type: approval
    message: "Review the generated draft before continuing"
    show: $steps.generate.output
    depends_on: [generate]
    timeout: 3600

  - id: choose-style
    type: prompt
    question: "What formatting style should we use for the final output?"
    options: [minimal, detailed, bullet-points]
    depends_on: [review]
    timeout: 3600

  - id: finalize
    type: script
    run: "python3 scripts/finalize.py"
    input:
      - $steps.generate.output
      - $steps.choose-style.output
    output: $inputs.output_dir/$DATE-$RUN_ID-report.md
    depends_on: [choose-style]
    timeout: 30

on_failure:
  strategy: halt
  notify: false
